<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="50%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
    <linearGradient id="accentV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#00b4d8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Decorative grid lines -->
  <g opacity="0.06" stroke="#00d4aa" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Floating UUID fragments (background decoration) -->
  <g font-family="monospace" fill="#00d4aa" opacity="0.08" font-size="14">
    <text x="60" y="100">e7b2a91f-4c3d-4f8a-b12e-9d7c5a3f6e81</text>
    <text x="800" y="80">3a1f8b2c-7d4e-4a96-8f3b-c2d5e1a09b74</text>
    <text x="150" y="560">f4c8d2a1-6b3e-4d79-a52f-8e1c3b7d9a06</text>
    <text x="700" y="580">91d3f7a2-8c4b-4e15-b6a9-2f8d1c5e3a47</text>
    <text x="900" y="200">b5e9c1d8-2a7f-4634-9d8b-f3a6e2c71054</text>
    <text x="40" y="380">7c4a2d8f-e1b5-4903-a67d-3f9b8c2e5d10</text>
  </g>

  <!-- Network nodes decoration (left) -->
  <g opacity="0.15">
    <circle cx="100" cy="220" r="5" fill="#00d4aa"/>
    <circle cx="180" cy="180" r="4" fill="#00d4aa"/>
    <circle cx="140" cy="280" r="3" fill="#00d4aa"/>
    <line x1="100" y1="220" x2="180" y2="180" stroke="#00d4aa" stroke-width="1"/>
    <line x1="100" y1="220" x2="140" y2="280" stroke="#00d4aa" stroke-width="1"/>
  </g>

  <!-- Network nodes decoration (right) -->
  <g opacity="0.15">
    <circle cx="1140" cy="380" r="5" fill="#00d4aa"/>
    <circle cx="1200" cy="340" r="4" fill="#00d4aa"/>
    <circle cx="1180" cy="440" r="3" fill="#00d4aa"/>
    <line x1="1140" y1="380" x2="1200" y2="340" stroke="#00d4aa" stroke-width="1"/>
    <line x1="1140" y1="380" x2="1180" y2="440" stroke="#00d4aa" stroke-width="1"/>
  </g>

  <!-- Main content -->
  <g transform="translate(640, 260)">
    <!-- Tag icon -->
    <g transform="translate(-220, 0)">
      <rect x="-52" y="-36" width="104" height="72" rx="10" fill="none" stroke="url(#accentV)" stroke-width="4"/>
      <circle cx="-30" cy="-14" r="6" fill="none" stroke="#00d4aa" stroke-width="3"/>
      <text x="0" y="6" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#00d4aa">a3f8</text>
      <text x="0" y="22" text-anchor="middle" font-family="monospace" font-size="9" fill="#00d4aa" opacity="0.5">ID</text>
    </g>

    <!-- Arrow -->
    <line x1="-150" y1="0" x2="-120" y2="0" stroke="#00d4aa" stroke-width="2" opacity="0.4"/>
    <polygon points="-120,-5 -110,0 -120,5" fill="#00d4aa" opacity="0.4"/>

    <!-- Plugin name -->
    <text x="60" y="-8" text-anchor="middle" font-family="sans-serif" font-size="48" font-weight="bold" fill="white" letter-spacing="2">
      Request ID
    </text>

    <!-- Accent line -->
    <rect x="-50" y="14" width="220" height="3" rx="2" fill="url(#accent)" opacity="0.8"/>

    <!-- Subtitle -->
    <text x="60" y="50" text-anchor="middle" font-family="sans-serif" font-size="18" fill="#8892a4" letter-spacing="3">
      TRAEFIK MIDDLEWARE PLUGIN
    </text>
  </g>

  <!-- Sample UUID at bottom -->
  <text x="640" y="400" text-anchor="middle" font-family="monospace" font-size="16" fill="#00d4aa" opacity="0.25" letter-spacing="2">
    X-Request-ID: e7b2a91f-4c3d-4f8a-b12e-9d7c5a3f6e81
  </text>
</svg>